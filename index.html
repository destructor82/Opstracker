<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsTracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.38);
    --glass-blur: blur(20px);
    --bg-grad: linear-gradient(135deg, #c8d8ff 0%, #e8d8ff 40%, #d0ecff 100%);
    --card-bg: rgba(255,255,255,0.22);
    --card-border: rgba(255,255,255,0.48);
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a6a;
    --text-muted: #7a7a9a;
    --accent: #6c63ff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --completed-bg: rgba(16,185,129,0.08);
    --completed-border: rgba(16,185,129,0.22);
    --pill-bg: rgba(108,99,255,0.12);
    --input-bg: rgba(255,255,255,0.45);
    --input-border: rgba(255,255,255,0.6);
    --toolbar-bg: rgba(255,255,255,0.3);
    --modal-overlay: rgba(20,10,60,0.38);
    --shadow: 0 8px 32px rgba(80,60,200,0.12);
    --badge-high-bg: rgba(239,68,68,0.13); --badge-high-text: #c0170a;
    --badge-medium-bg: rgba(180,110,0,0.13); --badge-medium-text: #92620a;
    --badge-low-bg: rgba(5,130,80,0.13); --badge-low-text: #0a7a50;
    --priority-high-border: #dc2626;
    --priority-medium-border: #d97706;
    --priority-low-border: #059669;
  }
  body.dark {
    --glass-bg: rgba(20,15,50,0.5);
    --glass-border: rgba(255,255,255,0.1);
    --bg-grad: linear-gradient(135deg, #0f0c29 0%, #1c1040 45%, #0d1b2a 100%);
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.1);
    --text-primary: #e8e4ff;
    --text-secondary: #b0aad4;
    --text-muted: #6860a0;
    --accent: #a78bfa;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --completed-bg: rgba(52,211,153,0.07);
    --completed-border: rgba(52,211,153,0.18);
    --pill-bg: rgba(167,139,250,0.14);
    --input-bg: rgba(255,255,255,0.07);
    --input-border: rgba(255,255,255,0.13);
    --toolbar-bg: rgba(255,255,255,0.05);
    --modal-overlay: rgba(0,0,0,0.65);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --badge-high-bg: rgba(248,113,113,0.18); --badge-high-text: #fca5a5;
    --badge-medium-bg: rgba(251,191,36,0.16); --badge-medium-text: #fcd34d;
    --badge-low-bg: rgba(52,211,153,0.16); --badge-low-text: #6ee7b7;
    --priority-high-border: #f87171;
    --priority-medium-border: #fbbf24;
    --priority-low-border: #34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  body{background:var(--bg-grad);background-attachment:fixed;color:var(--text-primary);transition:background 0.4s,color 0.3s;}

  .topbar{
    position:sticky;top:0;z-index:100;
    background:var(--toolbar-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    border-bottom:1px solid var(--glass-border);
    padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .topbar-brand{font-size:19px;font-weight:800;background:linear-gradient(90deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;min-width:120px;}
  .sync-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;background:var(--pill-bg);color:var(--text-muted);transition:background 0.3s,color 0.3s;}
  .sync-badge.syncing{background:rgba(245,158,11,0.18);color:var(--warning);}
  .sync-badge.synced{background:rgba(16,185,129,0.15);color:var(--success);}
  .sync-badge.error{background:rgba(239,68,68,0.15);color:var(--danger);}

  .btn{
    display:inline-flex;align-items:center;gap:5px;
    padding:7px 15px;border-radius:22px;font-size:13px;font-weight:600;
    cursor:pointer;border:1px solid var(--glass-border);
    background:var(--glass-bg);backdrop-filter:var(--glass-blur);
    color:var(--text-primary);transition:all 0.18s;white-space:nowrap;
  }
  .btn:hover{background:var(--card-bg);transform:translateY(-1px);box-shadow:var(--shadow);}
  .btn:active{transform:translateY(0);}
  .btn-save{background:linear-gradient(90deg,#6c63ff,#a78bfa);color:#fff;border:none;}
  .btn-save:hover{opacity:0.88;}
  .btn-sm{padding:4px 11px;font-size:12px;border-radius:14px;}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-accent:hover{opacity:0.88;}
  .btn-danger{background:rgba(239,68,68,0.15);color:var(--danger);border-color:rgba(239,68,68,0.3);}

  .searchbar{
    background:var(--toolbar-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    border-bottom:1px solid var(--glass-border);
    padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  }
  .search-input{
    flex:1;min-width:160px;padding:7px 14px;border-radius:18px;
    border:1px solid var(--input-border);background:var(--input-bg);
    backdrop-filter:blur(8px);color:var(--text-primary);font-size:13px;outline:none;transition:border-color 0.2s;
  }
  .search-input:focus{border-color:var(--accent);}
  .filter-sel{
    padding:7px 12px;border-radius:16px;font-size:13px;
    border:1px solid var(--input-border);background:var(--input-bg);
    backdrop-filter:blur(8px);color:var(--text-primary);outline:none;cursor:pointer;
  }
  .filter-sel option{background:#f0eeff;color:#1a1a2e;}
  body.dark .filter-sel option{background:#1c1040;color:#e8e4ff;}

  .main{max-width:1400px;margin:0 auto;padding:22px 16px 80px;}
  .section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}

  .section-card{
    background:var(--card-bg);border:1px solid var(--card-border);
    border-radius:22px;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    box-shadow:var(--shadow);overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .section-card:hover{box-shadow:0 12px 40px rgba(108,99,255,0.14);}
  .section-header{padding:13px 15px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--glass-border);}
  .section-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .section-title{font-size:14px;font-weight:700;flex:1;}
  .section-count{font-size:11px;color:var(--text-muted);background:var(--pill-bg);padding:2px 8px;border-radius:10px;}
  .section-body{padding:10px 12px;}

  .item-card{
    background:var(--glass-bg);border:1px solid var(--glass-border);
    border-radius:14px;padding:10px 12px;margin-bottom:8px;transition:all 0.18s;
  }
  .item-card:hover{background:var(--card-bg);box-shadow:0 4px 16px rgba(108,99,255,0.08);}
  .item-card.completed{background:var(--completed-bg);border-color:var(--completed-border);opacity:0.82;}
  .item-card.p-high{border-left:3px solid var(--priority-high-border);}
  .item-card.p-medium{border-left:3px solid var(--priority-medium-border);}
  .item-card.p-low{border-left:3px solid var(--priority-low-border);}

  .item-top{display:flex;align-items:flex-start;gap:8px;}
  .item-cb{
    width:18px;height:18px;border-radius:5px;border:2px solid var(--text-muted);
    cursor:pointer;flex-shrink:0;margin-top:1px;appearance:none;-webkit-appearance:none;
    background:var(--input-bg);transition:all 0.18s;position:relative;
  }
  .item-cb:checked{background:var(--success);border-color:var(--success);}
  .item-cb:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:12px;color:#fff;font-weight:700;}
  .item-text{flex:1;font-size:13px;color:var(--text-primary);word-break:break-word;line-height:1.45;}
  .item-text.done{text-decoration:line-through;color:var(--text-muted);}
  .item-actions{display:flex;gap:2px;flex-shrink:0;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:3px 4px;border-radius:7px;transition:color 0.18s,background 0.18s;line-height:1;}
  .icon-btn:hover{color:var(--text-primary);background:var(--pill-bg);}

  .item-notes{font-size:12px;color:var(--text-muted);margin-top:5px;padding-left:26px;line-height:1.4;}
  .item-meta{display:flex;align-items:center;gap:5px;margin-top:6px;padding-left:26px;flex-wrap:wrap;}
  .badge{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600;}
  .badge-high{background:var(--badge-high-bg);color:var(--badge-high-text);}
  .badge-medium{background:var(--badge-medium-bg);color:var(--badge-medium-text);}
  .badge-low{background:var(--badge-low-bg);color:var(--badge-low-text);}
  .badge-date{background:var(--pill-bg);color:var(--text-secondary);font-weight:400;}
  .badge-section{background:rgba(108,99,255,0.1);color:var(--accent);font-weight:500;}

  .completed-section{margin-top:8px;border-top:1px dashed var(--completed-border);padding-top:8px;}
  .completed-toggle-row{
    font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;
    letter-spacing:0.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px;
    cursor:pointer;user-select:none;padding:3px 0;
  }
  .completed-toggle-row:hover{color:var(--text-secondary);}

  /* MODAL */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:200;
    background:var(--modal-overlay);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    align-items:center;justify-content:center;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    border:1px solid var(--card-border);border-radius:26px;
    padding:26px;width:100%;max-width:460px;
    box-shadow:var(--shadow);animation:modalIn 0.22s ease;
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-title{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--text-primary);}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
  .form-input,.form-select,.form-textarea{
    width:100%;padding:9px 13px;border-radius:13px;
    border:1px solid var(--input-border);background:var(--input-bg);
    backdrop-filter:blur(8px);color:var(--text-primary);
    font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-select option{background:#f0eeff;color:#1a1a2e;}
  body.dark .form-select option{background:#1c1040;color:#e8e4ff;}
  .form-textarea{resize:vertical;min-height:72px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

  /* Completed date row — shown only when checkbox ticked */
  .completed-date-row{
    display:none;margin-top:10px;padding:10px 12px;
    background:var(--completed-bg);border:1px solid var(--completed-border);
    border-radius:12px;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .completed-date-row.show{display:flex;}
  .completed-date-row label{font-size:12px;color:var(--success);font-weight:600;white-space:nowrap;}
  .completed-date-row input{
    flex:1;min-width:130px;padding:6px 10px;border-radius:10px;
    border:1px solid var(--completed-border);background:var(--input-bg);
    color:var(--text-primary);font-size:13px;font-family:inherit;outline:none;
  }
  .completed-date-row input:focus{border-color:var(--success);}

  /* Move modal */
  .move-modal{max-width:380px;}
  .move-section-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;max-height:320px;overflow-y:auto;}
  .move-section-btn{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    border-radius:14px;border:1px solid var(--glass-border);background:var(--glass-bg);
    cursor:pointer;color:var(--text-primary);font-size:13px;font-weight:600;
    transition:all 0.18s;text-align:left;width:100%;
  }
  .move-section-btn:hover{background:var(--card-bg);transform:translateX(3px);}
  .move-section-btn.current{opacity:0.4;cursor:default;pointer-events:none;}
  .move-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  /* Config modal */
  .config-modal{max-width:500px;}
  .config-field{margin-bottom:12px;}
  .config-field label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;}
  .config-field input{width:100%;padding:8px 12px;border-radius:11px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-primary);font-size:13px;font-family:monospace;outline:none;}
  .config-field input:focus{border-color:var(--accent);}
  .config-note{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:10px;padding:10px 12px;background:var(--pill-bg);border-radius:10px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
    background:linear-gradient(90deg,#6c63ff,#a78bfa);color:#fff;
    padding:10px 24px;border-radius:22px;font-size:13px;font-weight:700;z-index:300;
    opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;
    box-shadow:0 4px 20px rgba(108,99,255,0.3);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .status-footer{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--toolbar-bg);backdrop-filter:var(--glass-blur);
    border-top:1px solid var(--glass-border);
    padding:5px 20px;font-size:11px;color:var(--text-muted);text-align:center;z-index:90;
  }

  .file-input-label{cursor:pointer;}
  .file-input-label input[type=file]{display:none;}

  @media(max-width:640px){
    .section-grid{grid-template-columns:1fr;}
    .topbar{padding:8px 12px;gap:6px;}
    .topbar-brand{font-size:15px;}
    .btn{padding:6px 10px;font-size:12px;}
    .main{padding:12px 10px 80px;}
    .searchbar{padding:6px 12px;}
    .form-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">OpsTracker</div>
  <span class="sync-badge" id="sync-badge">↻ Loading</span>
  <button class="btn btn-save" id="btn-save">💾 Save Now</button>
  <button class="btn" id="btn-export">📤 Export</button>
  <label class="btn file-input-label">📥 Import<input type="file" id="import-file" accept=".xlsx,.xls"></label>
  <button class="btn" id="theme-btn">🌙 Dark</button>
  <button class="btn" id="btn-db" title="Database info">⚙️ DB</button>
</div>

<div class="searchbar">
  <input class="search-input" id="search-input" placeholder="🔍  Search all items...">
  <select class="filter-sel" id="filter-priority">
    <option value="">All priorities</option>
    <option value="high">🔴 High</option>
    <option value="medium">🟡 Medium</option>
    <option value="low">🟢 Low</option>
  </select>
</div>

<div class="main">
  <div class="section-grid" id="section-grid"></div>
</div>

<div class="status-footer" id="status-footer">Initialising...</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Item</div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="f-title" placeholder="Enter title..." maxlength="250">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Optional notes..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="f-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Section</label>
      <select class="form-select" id="f-section"></select>
    </div>
    <!-- Completed toggle row -->
    <div class="form-group" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" class="item-cb" id="f-completed" style="margin-top:0;flex-shrink:0;">
      <label for="f-completed" class="form-label" style="margin-bottom:0;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;">Mark as completed</label>
    </div>
    <div class="completed-date-row" id="f-completed-date-row">
      <label>✓ Completed on</label>
      <input type="date" id="f-completed-date">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn btn-accent" id="modal-save">Save Item</button>
    </div>
  </div>
</div>

<!-- MOVE MODAL -->
<div class="modal-overlay" id="move-overlay">
  <div class="modal move-modal">
    <div class="modal-title">↗ Move to section</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;" id="move-item-title"></p>
    <div class="move-section-list" id="move-section-list"></div>
    <div class="modal-actions">
      <button class="btn" id="move-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="config-overlay">
  <div class="modal config-modal">
    <div class="modal-title">⚙️ Database Info</div>
    <div class="config-field">
      <label>Supabase URL</label>
      <input id="cfg-url" readonly>
    </div>
    <div class="config-field">
      <label>API Key</label>
      <input id="cfg-key" readonly>
    </div>
    <div class="config-note">Credentials are hardcoded in this app. Data syncs automatically across all devices that open this URL.</div>
    <div class="modal-actions">
      <button class="btn btn-accent" id="cfg-close">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   SECTIONS
══════════════════════════════════════ */
const SECTIONS = [
  { id:'notes',         label:'Notes',          color:'#6c63ff' },
  { id:'it_calls',      label:'IT Calls',        color:'#3b82f6' },
  { id:'anpr_calls',    label:'ANPR Calls',      color:'#8b5cf6' },
  { id:'piq_calls',     label:'PIQ Calls',       color:'#06b6d4' },
  { id:'viq_calls',     label:'VIQ Calls',       color:'#f59e0b' },
  { id:'ciq_calls',     label:'CIQ Calls',       color:'#ef4444' },
  { id:'appointments',  label:'Appointments',    color:'#10b981' },
  { id:'fleet',         label:'Fleet Related',   color:'#f97316' },
  { id:'general',       label:'General',         color:'#64748b' },
  { id:'hr',            label:'HR Related',      color:'#ec4899' },
  { id:'other',         label:'Other',           color:'#84cc16' },
];

const LS_DATA  = 'opstracker_v5';
const LS_THEME = 'opstracker_theme';

/* Hardcoded Supabase credentials */
const SB_URL  = 'https://rdpksldlbtohwhkqipct.supabase.co';
const SB_KEY  = 'sb_publishable_j6BFuUZ0go87lRNi9NlNvw_EOx_Wi27';
const REST    = SB_URL + '/rest/v1/opstracker_state';
const HDRS    = {
  'Content-Type': 'application/json',
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Prefer': 'resolution=merge-duplicates'
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let state = {};
let expandedDone = {};
let isDark = false;
let saveTimer = null;
let modalSection = null;
let modalItemId = null;
let moveItemId = null;
let moveFromSection = null;
let isSyncing = false;
let pollTimer = null;
let lastUpdatedAt = null;

SECTIONS.forEach(s => { state[s.id] = []; expandedDone[s.id] = false; });

/* ══════════════════════════════════════
   SUPABASE REST
══════════════════════════════════════ */
async function dbLoad() {
  setSyncBadge('syncing','↻ Syncing...');
  try {
    const r = await fetch(REST + '?id=eq.1&select=payload,updated_at', { headers: HDRS });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rows = await r.json();
    if (rows && rows.length && rows[0].payload) {
      const remote = JSON.parse(rows[0].payload);
      SECTIONS.forEach(s => { state[s.id] = remote[s.id] || []; });
      lastUpdatedAt = rows[0].updated_at;
      persistLocal();
      setSyncBadge('synced','✓ Synced');
    } else {
      loadLocal();
      await dbSave(true);
    }
  } catch(e) {
    console.error('DB load:', e);
    setSyncBadge('error','✕ DB error — local');
    loadLocal();
  }
  renderAll();
  startPolling();
}

async function dbSave(silent) {
  if (isSyncing) return;
  isSyncing = true;
  setSyncBadge('syncing','↻ Saving...');
  try {
    const payload = {};
    SECTIONS.forEach(s => { payload[s.id] = state[s.id]; });
    const now = new Date().toISOString();
    const r = await fetch(REST, {
      method: 'POST',
      headers: { ...HDRS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id:1, payload: JSON.stringify(payload), updated_at: now })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    lastUpdatedAt = now;
    setSyncBadge('synced','✓ Synced ' + new Date().toLocaleTimeString());
    setStatus('Saved ' + new Date().toLocaleTimeString());
    if (!silent) showToast('Saved ✓');
  } catch(e) {
    console.error('DB save:', e);
    setSyncBadge('error','✕ Save failed');
    if (!silent) showToast('Save failed ✗');
  }
  isSyncing = false;
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(REST + '?id=eq.1&select=payload,updated_at', { headers: HDRS });
      if (!r.ok) return;
      const rows = await r.json();
      if (!rows || !rows.length) return;
      const row = rows[0];
      if (row.updated_at && row.updated_at !== lastUpdatedAt) {
        lastUpdatedAt = row.updated_at;
        if (row.payload) {
          const remote = JSON.parse(row.payload);
          SECTIONS.forEach(s => { state[s.id] = remote[s.id] || []; });
          persistLocal();
          renderAll();
          setSyncBadge('synced','✓ Live ' + new Date().toLocaleTimeString());
        }
      }
    } catch(e) {}
  }, 8000);
}

/* ══════════════════════════════════════
   LOCAL STORAGE
══════════════════════════════════════ */
function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_DATA);
    if (raw) { const d = JSON.parse(raw); SECTIONS.forEach(s => { if(d[s.id]) state[s.id]=d[s.id]; }); }
    setStatus('Loaded from local storage');
  } catch(e) {}
}
function persistLocal() {
  try { const p={}; SECTIONS.forEach(s=>{p[s.id]=state[s.id];}); localStorage.setItem(LS_DATA,JSON.stringify(p)); } catch(e){}
}
function saveNow() { persistLocal(); dbSave(false); }
function autoSave() {
  persistLocal();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => dbSave(true), 1400);
}

/* ══════════════════════════════════════
   THEME
══════════════════════════════════════ */
function toggleTheme() {
  isDark = !isDark;
  isDark ? document.body.classList.add('dark') : document.body.classList.remove('dark');
  document.getElementById('theme-btn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem(LS_THEME, isDark ? '1' : '0');
}
function loadTheme() {
  isDark = localStorage.getItem(LS_THEME) === '1';
  if (isDark) { document.body.classList.add('dark'); document.getElementById('theme-btn').textContent = '☀️ Light'; }
}

/* ══════════════════════════════════════
   UI HELPERS
══════════════════════════════════════ */
function setSyncBadge(cls, text) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-badge ' + cls; b.textContent = text;
}
function setStatus(msg) { const el=document.getElementById('status-footer'); if(el) el.textContent=msg; }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove('show'),2200);
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr() { return new Date().toISOString().slice(0,10); }

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderAll() {
  const q  = (document.getElementById('search-input').value||'').toLowerCase();
  const fp = document.getElementById('filter-priority').value;
  const grid = document.getElementById('section-grid');
  grid.innerHTML = '';
  SECTIONS.forEach(s => grid.appendChild(buildSectionCard(s, q, fp)));
}

function matchesFilter(item, q, fp) {
  if (fp && item.priority !== fp) return false;
  if (q) { const hay=((item.title||'')+' '+(item.notes||'')).toLowerCase(); if(!hay.includes(q)) return false; }
  return true;
}

function buildSectionCard(s, q, fp) {
  const items  = state[s.id] || [];
  const active = items.filter(i => !i.completed && matchesFilter(i,q,fp));
  const done   = items.filter(i =>  i.completed && matchesFilter(i,q,fp));
  const po = {high:0,medium:1,low:2};
  active.sort((a,b) => (po[a.priority]||1)-(po[b.priority]||1)||(a.date||'').localeCompare(b.date||''));

  const wrap = document.createElement('div');
  wrap.className = 'section-card';
  let h = `
    <div class="section-header">
      <div class="section-dot" style="background:${s.color}"></div>
      <div class="section-title">${s.label}</div>
      <div class="section-count">${active.length} active${done.length?' · '+done.length+' done':''}</div>
    </div>
    <div class="section-body">
      <div style="margin-bottom:8px">
        <button class="btn btn-sm add-item-btn" data-section="${s.id}">+ Add item</button>
      </div>`;
  active.forEach(item => { h += itemHTML(item, s.id); });
  if (done.length) {
    const exp = expandedDone[s.id];
    h += `<div class="completed-section">
      <div class="completed-toggle-row toggle-done-btn" data-section="${s.id}">
        <span>${exp?'▾':'▸'}</span>Completed (${done.length})
      </div>`;
    if (exp) done.forEach(item => { h += itemHTML(item, s.id); });
    h += '</div>';
  }
  h += '</div>';
  wrap.innerHTML = h;
  return wrap;
}

function itemHTML(item, sid) {
  const p = item.priority || 'medium';
  const labels = {high:'High',medium:'Medium',low:'Low'};
  let completedDateBadge = '';
  if (item.completed && item.completedAt) {
    const d = item.completedAt.length === 10 ? item.completedAt : new Date(item.completedAt).toLocaleDateString();
    completedDateBadge = `<span class="badge badge-date">✓ ${d}</span>`;
  }
  return `
    <div class="item-card ${item.completed?'completed':''} p-${p}" data-id="${item.id}" data-section="${sid}">
      <div class="item-top">
        <input type="checkbox" class="item-cb toggle-item-cb" ${item.completed?'checked':''} data-id="${item.id}" data-section="${sid}">
        <div class="item-text ${item.completed?'done':''}">${esc(item.title)}</div>
        <div class="item-actions">
          <button class="icon-btn move-item-btn" data-id="${item.id}" data-section="${sid}" title="Move to section">↗</button>
          <button class="icon-btn edit-item-btn" data-id="${item.id}" data-section="${sid}" title="Edit">✏️</button>
          <button class="icon-btn del-item-btn"  data-id="${item.id}" data-section="${sid}" title="Delete">🗑️</button>
        </div>
      </div>
      ${item.notes?`<div class="item-notes">${esc(item.notes)}</div>`:''}
      <div class="item-meta">
        <span class="badge badge-${p}">${labels[p]}</span>
        ${item.date?`<span class="badge badge-date">📅 ${item.date}</span>`:''}
        ${completedDateBadge}
      </div>
    </div>`;
}

/* ══════════════════════════════════════
   ITEM ACTIONS
══════════════════════════════════════ */
function toggleItem(sid, id, checked) {
  const item = (state[sid]||[]).find(i=>i.id===id);
  if (!item) return;
  if (checked) {
    /* open edit modal so user can set completed date */
    item.completed = true;
    if (!item.completedAt) item.completedAt = todayStr();
    autoSave(); renderAll();
    /* prompt user to confirm/change the date */
    openEdit(sid, id, true);
  } else {
    item.completed = false; item.completedAt = null;
    autoSave(); renderAll();
  }
}

function delItem(sid, id) {
  if (!confirm('Delete this item?')) return;
  state[sid] = (state[sid]||[]).filter(i=>i.id!==id);
  autoSave(); renderAll();
}
function toggleDone(sid) { expandedDone[sid]=!expandedDone[sid]; renderAll(); }

/* ══════════════════════════════════════
   MOVE ITEM
══════════════════════════════════════ */
function openMove(sid, id) {
  moveFromSection = sid; moveItemId = id;
  const item = (state[sid]||[]).find(i=>i.id===id);
  if (!item) return;
  document.getElementById('move-item-title').textContent = '"' + (item.title||'') + '"';
  const list = document.getElementById('move-section-list');
  list.innerHTML = SECTIONS.map(s => `
    <button class="move-section-btn ${s.id===sid?'current':''}" data-target="${s.id}">
      <span class="move-dot" style="background:${s.color}"></span>
      ${s.label} ${s.id===sid?'<span style="font-size:11px;opacity:0.6">(current)</span>':''}
    </button>`).join('');
  document.getElementById('move-overlay').classList.add('open');
}

function doMove(targetSection) {
  if (!moveItemId || !moveFromSection || targetSection === moveFromSection) { closeMove(); return; }
  const item = (state[moveFromSection]||[]).find(i=>i.id===moveItemId);
  if (!item) { closeMove(); return; }
  state[moveFromSection] = state[moveFromSection].filter(i=>i.id!==moveItemId);
  if (!state[targetSection]) state[targetSection]=[];
  state[targetSection].push(item);
  closeMove();
  autoSave(); renderAll();
  const tLabel = SECTIONS.find(s=>s.id===targetSection)?.label||targetSection;
  showToast('Moved to ' + tLabel + ' ✓');
}

function closeMove() {
  document.getElementById('move-overlay').classList.remove('open');
  moveItemId=null; moveFromSection=null;
}

/* ══════════════════════════════════════
   ITEM MODAL
══════════════════════════════════════ */
function populateSectionDropdown(selectedId) {
  const sel = document.getElementById('f-section');
  sel.innerHTML = SECTIONS.map(s =>
    `<option value="${s.id}" ${s.id===selectedId?'selected':''}>${s.label}</option>`
  ).join('');
}

function openAdd(sid) {
  modalSection = sid; modalItemId = null;
  document.getElementById('modal-title').textContent = 'Add to ' + SECTIONS.find(x=>x.id===sid).label;
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-date').value = todayStr();
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-completed').checked = false;
  document.getElementById('f-completed-date').value = '';
  document.getElementById('f-completed-date-row').classList.remove('show');
  document.getElementById('f-title').style.borderColor = '';
  populateSectionDropdown(sid);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}

function openEdit(sid, id, justCompleted) {
  modalSection = sid; modalItemId = id;
  const item = (state[sid]||[]).find(i=>i.id===id);
  if (!item) return;
  document.getElementById('modal-title').textContent = justCompleted ? '✓ Set completed date' : 'Edit — ' + SECTIONS.find(x=>x.id===sid).label;
  document.getElementById('f-title').value = item.title||'';
  document.getElementById('f-notes').value = item.notes||'';
  document.getElementById('f-date').value = item.date||'';
  document.getElementById('f-priority').value = item.priority||'medium';
  const isCompleted = !!item.completed;
  document.getElementById('f-completed').checked = isCompleted;
  const cDate = item.completedAt ? (item.completedAt.length===10 ? item.completedAt : new Date(item.completedAt).toISOString().slice(0,10)) : todayStr();
  document.getElementById('f-completed-date').value = cDate;
  const row = document.getElementById('f-completed-date-row');
  isCompleted ? row.classList.add('show') : row.classList.remove('show');
  document.getElementById('f-title').style.borderColor = '';
  populateSectionDropdown(sid);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalSection=null; modalItemId=null;
}

function saveItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor='var(--danger)'; document.getElementById('f-title').focus(); return; }
  const date      = document.getElementById('f-date').value;
  const priority  = document.getElementById('f-priority').value;
  const notes     = document.getElementById('f-notes').value.trim();
  const completed = document.getElementById('f-completed').checked;
  const newSection= document.getElementById('f-section').value;
  let completedAt = null;
  if (completed) {
    const cd = document.getElementById('f-completed-date').value;
    completedAt = cd || todayStr();
  }

  if (modalItemId) {
    /* editing existing — may also be moving section */
    const oldSection = modalSection;
    const item = (state[oldSection]||[]).find(i=>i.id===modalItemId);
    if (item) {
      item.title=title; item.notes=notes; item.date=date; item.priority=priority;
      item.completed=completed; item.completedAt=completedAt;
      if (newSection !== oldSection) {
        state[oldSection] = state[oldSection].filter(i=>i.id!==modalItemId);
        if (!state[newSection]) state[newSection]=[];
        state[newSection].push(item);
      }
    }
  } else {
    if (!state[newSection]) state[newSection]=[];
    state[newSection].push({ id:uid(), title, notes, date, priority, completed, completedAt, createdAt:new Date().toISOString() });
  }
  closeModal(); autoSave(); renderAll();
}

/* ══════════════════════════════════════
   CONFIG MODAL
══════════════════════════════════════ */
function openConfig() {
  document.getElementById('cfg-url').value = SB_URL;
  document.getElementById('cfg-key').value = SB_KEY;
  document.getElementById('config-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('config-overlay').classList.remove('open'); }

/* ══════════════════════════════════════
   EXCEL
══════════════════════════════════════ */
function exportExcel() {
  if (typeof XLSX === 'undefined') { showToast('XLSX library not loaded yet'); return; }
  const wb = XLSX.utils.book_new();
  SECTIONS.forEach(s => {
    const rows = (state[s.id]||[]).map(i => ({
      Title:i.title||'', Notes:i.notes||'', Date:i.date||'', Priority:i.priority||'medium',
      Completed:i.completed?'Yes':'No',
      'Completed Date':i.completedAt||'',
      'Created At':i.createdAt?new Date(i.createdAt).toLocaleString():''
    }));
    const ws = XLSX.utils.json_to_sheet(rows.length?rows:[{Title:'',Notes:'',Date:'',Priority:'',Completed:'','Completed Date':'','Created At':''}]);
    ws['!cols']=[{wch:35},{wch:45},{wch:12},{wch:10},{wch:10},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws, s.label.slice(0,31));
  });
  XLSX.writeFile(wb, 'OpsTracker_'+todayStr()+'.xlsx');
  showToast('Exported ✓');
}

function importExcel(input) {
  if (typeof XLSX === 'undefined') { showToast('XLSX library not loaded yet'); return; }
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result,{type:'binary'});
      let count = 0;
      SECTIONS.forEach(s => {
        const sheetName = Object.keys(wb.Sheets).find(n=>n===s.label||n===s.label.slice(0,31));
        if (!sheetName) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
        rows.forEach(row => {
          if (!row.Title) return;
          if (!state[s.id]) state[s.id]=[];
          const completed = String(row.Completed||'').toLowerCase()==='yes';
          state[s.id].push({
            id:uid(), title:String(row.Title||''), notes:String(row.Notes||''),
            date:String(row.Date||''), priority:String(row.Priority||'medium').toLowerCase(),
            completed, completedAt: completed ? (row['Completed Date']||todayStr()) : null,
            createdAt:new Date().toISOString()
          });
          count++;
        });
      });
      autoSave(); renderAll(); showToast('Imported '+count+' items ✓');
    } catch(err) { showToast('Import failed — check file format'); }
    input.value='';
  };
  reader.readAsBinaryString(file);
}

/* ══════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {

  /* Topbar */
  document.getElementById('btn-save').addEventListener('click', saveNow);
  document.getElementById('btn-export').addEventListener('click', exportExcel);
  document.getElementById('btn-db').addEventListener('click', openConfig);
  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('import-file').addEventListener('change', function(){ importExcel(this); });

  /* Search & filter */
  document.getElementById('search-input').addEventListener('input', renderAll);
  document.getElementById('filter-priority').addEventListener('change', renderAll);

  /* Item modal buttons */
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', saveItem);
  document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

  /* Completed checkbox toggle inside modal */
  document.getElementById('f-completed').addEventListener('change', function() {
    const row = document.getElementById('f-completed-date-row');
    if (this.checked) {
      row.classList.add('show');
      if (!document.getElementById('f-completed-date').value) document.getElementById('f-completed-date').value = todayStr();
    } else {
      row.classList.remove('show');
    }
  });

  /* Move modal */
  document.getElementById('move-cancel').addEventListener('click', closeMove);
  document.getElementById('move-overlay').addEventListener('click', function(e){ if(e.target===this) closeMove(); });
  document.getElementById('move-section-list').addEventListener('click', function(e){
    const btn = e.target.closest('.move-section-btn');
    if (btn && btn.dataset.target) doMove(btn.dataset.target);
  });

  /* Config modal */
  document.getElementById('cfg-close').addEventListener('click', closeConfig);
  document.getElementById('config-overlay').addEventListener('click', function(e){ if(e.target===this) closeConfig(); });

  /* Delegated clicks on section grid */
  document.getElementById('section-grid').addEventListener('click', function(e) {
    const addBtn = e.target.closest('.add-item-btn');
    if (addBtn) { openAdd(addBtn.dataset.section); return; }

    const toggleBtn = e.target.closest('.toggle-done-btn');
    if (toggleBtn) { toggleDone(toggleBtn.dataset.section); return; }

    const moveBtn = e.target.closest('.move-item-btn');
    if (moveBtn) { openMove(moveBtn.dataset.section, moveBtn.dataset.id); return; }

    const editBtn = e.target.closest('.edit-item-btn');
    if (editBtn) { openEdit(editBtn.dataset.section, editBtn.dataset.id, false); return; }

    const delBtn = e.target.closest('.del-item-btn');
    if (delBtn) { delItem(delBtn.dataset.section, delBtn.dataset.id); return; }
  });

  /* Delegated checkbox change */
  document.getElementById('section-grid').addEventListener('change', function(e) {
    if (e.target.classList.contains('toggle-item-cb')) {
      toggleItem(e.target.dataset.section, e.target.dataset.id, e.target.checked);
    }
  });

  /* Keyboard */
  document.addEventListener('keydown', function(e) {
    if (e.key==='Escape') { closeModal(); closeMove(); closeConfig(); }
    if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); saveNow(); }
    if (e.key==='Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
      if (document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='BUTTON'&&document.activeElement.tagName!=='SELECT') {
        e.preventDefault(); saveItem();
      }
    }
  });

  /* INIT */
  loadTheme();
  dbLoad();
});
</script>
